<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#c0392b" />
  <meta name="description" content="Practice reading and writing Chinese by typing HSK stories" />
  <link rel="icon" href="/hsk-writer/icons/icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="/hsk-writer/icons/icon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet" />
  <title>HSK Writer · 汉字练习</title>
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <div id="app">
    <header>
      <button id="back-btn" aria-label="返回" title="返回故事列表">&#8592;</button>
      <h1>HSK Writer · 汉字练习</h1>
    </header>

    <section id="story-list-view">
      <p class="intro">选一个故事开始练习。<br><span class="intro-en">Choose a story to start practising.</span></p>
      <div id="story-cards"></div>
    </section>

    <section id="practice-view">
      <div id="progress-bar-wrap" aria-label="进度">
        <div id="progress-bar"></div>
      </div>
      <p id="line-counter"></p>
      <div id="practice-area">
        <div id="target-line" aria-live="polite"></div>
        <input
          id="practice-input"
          type="text"
          lang="zh-CN"
          autocomplete="off"
          autocorrect="off"
          autocapitalize="off"
          spellcheck="false"
          aria-label="输入目标句子"
          placeholder="在这里输入…"
        />
      </div>
      <p id="feedback-msg"></p>
    </section>

    <section id="complete-view">
      <div class="complete-card">
        <div class="complete-icon">&#x1F389;</div>
        <h2>完成了！</h2>
        <p>You finished the story. Great work!</p>
        <button id="restart-btn">再练一次 · Try again</button>
        <button id="home-btn">选其他故事 · More stories</button>
      </div>
    </section>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
